<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로그램 입고 자동화 시스템</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="deck-shell" aria-label="프로그램 입고 자동화 시스템 발표 슬라이드">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="scanline"></div>

      <section class="stage" id="stage" aria-live="polite">
        <div class="slide-card is-loading" id="slideCard">
          <video class="slide-video is-active" id="slideVideoA" muted playsinline preload="auto"></video>
          <video class="slide-video" id="slideVideoB" muted playsinline preload="auto"></video>
        </div>
      </section>

      <div class="example-overlay" id="exampleOverlay" aria-label="예시 영상 버튼"></div>

      <button class="nav-button nav-prev" id="prevButton" type="button" aria-label="이전 슬라이드">
        <span aria-hidden="true">&lsaquo;</span>
      </button>
      <button class="nav-button nav-next" id="nextButton" type="button" aria-label="다음 슬라이드">
        <span aria-hidden="true">&rsaquo;</span>
      </button>

      <header class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <span>Spreadsheet Automation</span>
        </div>
        <button class="ghost-button" id="fullscreenButton" type="button">전체화면</button>
      </header>

      <footer class="controlbar">
        <div class="counter">
          <strong id="currentSlide">01</strong>
          <span>/</span>
          <span id="totalSlides">15</span>
        </div>
        <div
          class="progress-track"
          id="progressTrack"
          role="slider"
          aria-label="슬라이드 위치"
          aria-valuemin="1"
          aria-valuemax="15"
          aria-valuenow="1"
          tabindex="0"
        >
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="hint">← → / Space</div>
      </footer>

      <div class="example-modal" id="exampleModal" aria-hidden="true">
        <div class="example-dialog" role="dialog" aria-modal="true" aria-labelledby="exampleTitle">
          <div class="example-dialog-header">
            <strong id="exampleTitle">예시 영상</strong>
            <button class="example-close" id="exampleClose" type="button" aria-label="예시 영상 닫기">&times;</button>
          </div>
          <video class="example-player" id="examplePlayer" controls playsinline preload="metadata"></video>
        </div>
      </div>
    </main>

    <script defer src="./app.js"></script>
  </body>
</html>
